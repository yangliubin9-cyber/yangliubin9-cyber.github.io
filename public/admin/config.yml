backend:
  name: github
  repo: yangliubin9-cyber/yangliubin9-cyber.github.io
  branch: main

local_backend: true
site_url: https://yangliubin9-cyber.github.io
logo_url: /favicon.svg
media_folder: public/uploads
public_folder: /uploads
publish_mode: simple
slug:
  encoding: ascii
  clean_accents: true
  sanitize_replacement: '-'

collections:
  - name: posts_zh
    label: 中文文章
    label_singular: 中文文章
    folder: src/content/posts/zh
    create: true
    extension: mdx
    format: frontmatter
    slug: '{{fields.pathSlug}}'
    summary: '{{title}}'
    fields:
      - { label: 路径 Slug, name: pathSlug, widget: string }
      - { label: 翻译关联键, name: translationKey, widget: string }
      - { label: 语言, name: locale, widget: hidden, default: zh }
      - { label: 标题, name: title, widget: string }
      - { label: 摘要, name: excerpt, widget: text }
      - { label: 分类, name: category, widget: string }
      - { label: 发布时间, name: publishedAt, widget: datetime, format: 'YYYY-MM-DD', time_format: false }
      - { label: 更新日期, name: updatedAt, widget: datetime, required: false, format: 'YYYY-MM-DD', time_format: false }
      - { label: 首页精选, name: featured, widget: boolean, default: false }
      - label: 标签
        name: tags
        widget: list
        field: { label: 标签, name: tag, widget: string }
      - { label: 强调色, name: accent, widget: select, options: [yellow, cyan, violet], default: yellow }
      - { label: 眉标, name: heroEyebrow, widget: string, required: false }
      - { label: 正文, name: body, widget: markdown }

  - name: posts_en
    label: English Posts
    label_singular: English Post
    folder: src/content/posts/en
    create: true
    extension: mdx
    format: frontmatter
    slug: '{{fields.pathSlug}}'
    summary: '{{title}}'
    fields:
      - { label: Path Slug, name: pathSlug, widget: string }
      - { label: Translation Key, name: translationKey, widget: string }
      - { label: Locale, name: locale, widget: hidden, default: en }
      - { label: Title, name: title, widget: string }
      - { label: Excerpt, name: excerpt, widget: text }
      - { label: Category, name: category, widget: string }
      - { label: Published At, name: publishedAt, widget: datetime, format: 'YYYY-MM-DD', time_format: false }
      - { label: Updated At, name: updatedAt, widget: datetime, required: false, format: 'YYYY-MM-DD', time_format: false }
      - { label: Featured, name: featured, widget: boolean, default: false }
      - label: Tags
        name: tags
        widget: list
        field: { label: Tag, name: tag, widget: string }
      - { label: Accent, name: accent, widget: select, options: [yellow, cyan, violet], default: yellow }
      - { label: Hero Eyebrow, name: heroEyebrow, widget: string, required: false }
      - { label: Body, name: body, widget: markdown }
