name: Deploy Astro Site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PUBLIC_GISCUS_REPO: ${{ vars.PUBLIC_GISCUS_REPO || secrets.PUBLIC_GISCUS_REPO }}
      PUBLIC_GISCUS_REPO_ID: ${{ vars.PUBLIC_GISCUS_REPO_ID || secrets.PUBLIC_GISCUS_REPO_ID }}
      PUBLIC_GISCUS_CATEGORY: ${{ vars.PUBLIC_GISCUS_CATEGORY || secrets.PUBLIC_GISCUS_CATEGORY }}
      PUBLIC_GISCUS_CATEGORY_ID: ${{ vars.PUBLIC_GISCUS_CATEGORY_ID || secrets.PUBLIC_GISCUS_CATEGORY_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Verify giscus variables
        run: |
          echo "PUBLIC_GISCUS_REPO=${PUBLIC_GISCUS_REPO}"
          echo "PUBLIC_GISCUS_CATEGORY=${PUBLIC_GISCUS_CATEGORY}"
          test -n "${PUBLIC_GISCUS_REPO}" || (echo "Missing PUBLIC_GISCUS_REPO" && exit 1)
          test -n "${PUBLIC_GISCUS_REPO_ID}" || (echo "Missing PUBLIC_GISCUS_REPO_ID" && exit 1)
          test -n "${PUBLIC_GISCUS_CATEGORY}" || (echo "Missing PUBLIC_GISCUS_CATEGORY" && exit 1)
          test -n "${PUBLIC_GISCUS_CATEGORY_ID}" || (echo "Missing PUBLIC_GISCUS_CATEGORY_ID" && exit 1)

      - name: Build site
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
