name: Sync Feishu Posts

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Skip when Feishu credentials are missing
        if: ${{ secrets.FEISHU_APP_ID == '' || secrets.FEISHU_APP_SECRET == '' }}
        run: echo "Skipping Feishu sync because FEISHU_APP_ID / FEISHU_APP_SECRET are not configured yet."

      - name: Sync Feishu posts
        if: ${{ secrets.FEISHU_APP_ID != '' && secrets.FEISHU_APP_SECRET != '' }}
        run: npm run sync:feishu
        env:
          FEISHU_OPEN_BASE_URL: ${{ secrets.FEISHU_OPEN_BASE_URL }}
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}

      - name: Verify build
        env:
          ASTRO_TELEMETRY_DISABLED: '1'
        run: npm run build

      - name: Commit synced content
        run: |
          if git diff --quiet; then
            echo "No synced content changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/content/posts
          git commit -m "Sync Feishu posts"
          git push